[project]
name = "tenir-api"
version = "0.1.1"
description = "tenir: WebSocket + REST api for recorded, stored STT sessions, serving the built web UI from the same container."
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "pydantic>=2.9",
    "pydantic-settings>=2.5",
    "websockets>=13",
    "numpy>=1.26",
    # The Voxtral STT backend and the status probes are HTTP clients.
    "httpx>=0.27",
]

[project.optional-dependencies]
# Real persistence: the Postgres conversation store. The base install uses the
# in-memory backends (simulator/CI); enable with `pip install -e '.[persistence]'`.
persistence = [
    "psycopg[binary,pool]>=3.2",
]
dev = [
    "datamodel-code-generator>=0.26",
    "pytest>=8.3",
    "pytest-cov>=5.0",
    "httpx>=0.27",
    "ruff>=0.7",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
addopts = "--cov --cov-report=term-missing --cov-fail-under=85"
markers = [
    "real_auth: exercise the real auth dependencies with bearer tokens (skip the auto-authenticated admin override in conftest)",
]

[tool.coverage.run]
source_pkgs = ["api"]
# Generated from the JSON Schema contract; not hand-written code under test.
omit = ["**/api/contract/messages.py"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["api*"]
