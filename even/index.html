<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenir</title>
    <style>
      /* A faithful copy of the web UI's login styling (web/src/styles.css,
         "Lumen" design system): same tokens, wordmark header, section card,
         field/button primitives and toast — so the phone side of the glasses
         app IS the web UI's login, visually. Dark is the signature default;
         light follows the system preference (this WebView has no theme toggle).
         color-mix() values are precomputed to rgba for older WebViews. */
      :root {
        color-scheme: dark;

        /* spacing (4px base) */
        --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
        --space-5: 24px; --space-6: 32px;

        /* type scale (~1.2) */
        --text-xs: .75rem; --text-sm: .875rem; --text-base: 1rem;
        --text-xl: 1.375rem; --text-2xl: 1.75rem;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-display: "Space Grotesk", var(--font-sans);

        /* radius + shadow */
        --radius-sm: 8px; --radius-md: 11px; --radius-lg: 14px;
        --shadow-sm: 0 1px 2px rgba(0,0,0,.35);
        --shadow-md: 0 8px 24px rgba(0,0,0,.45);

        /* semantic colors (dark) */
        --bg: #0E1116;
        --surface: #161B22;
        --surface-raised: #1C232C;
        --border: #232B36;
        --border-strong: #313C4A;
        --text: #E6EDF3;
        --text-muted: #8B97A6;
        --accent: #3FD9C9;
        --accent-strong: #5FE3D5;
        --accent-ink: #0E1116;
        --focus-ring: rgba(63,217,201,.30); /* accent 30% */
        --danger: #FF6B6B;
        --danger-ink: #0E1116;
      }
      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --bg: #F7F9FB; --surface: #FFFFFF; --surface-raised: #F0F3F6;
          --border: #E2E8EF; --border-strong: #CBD5DF;
          --text: #0E1116; --text-muted: #5A6675;
          --accent: #0E8C7E; --accent-strong: #0B7468; --accent-ink: #FFFFFF;
          --focus-ring: rgba(14,140,126,.35); /* accent 35% */
          --danger: #C0392B; --danger-ink: #FFFFFF;
          --shadow-sm: 0 1px 2px rgba(16,22,30,.08);
          --shadow-md: 0 8px 24px rgba(16,22,30,.12);
        }
      }

      * { box-sizing: border-box; }
      body {
        font-family: var(--font-sans);
        margin: 0;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      /* ---- web UI structure: container > app-header > section ---- */
      .container { max-width: 1040px; margin: 0 auto; padding: var(--space-5) var(--space-4); }
      #login[hidden] { display: none; }

      .app-header {
        display: flex; align-items: center; gap: var(--space-3);
        padding-bottom: var(--space-4); border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .wordmark {
        font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl);
        letter-spacing: .04em; display: inline-flex; align-items: center; gap: var(--space-2);
        margin: 0;
      }
      .wordmark-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

      section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: var(--space-4) var(--space-5);
        margin: var(--space-4) 0;
        box-shadow: var(--shadow-sm);
      }
      h2 { font-family: var(--font-display); color: var(--text); font-size: var(--text-xl); margin: 0 0 var(--space-3); }
      p { line-height: 1.55; }
      .muted { color: var(--text-muted); font-size: var(--text-sm); }

      /* ---- web UI primitives: field / input / button / toast ---- */
      form { display: flex; flex-direction: column; gap: var(--space-3); max-width: 20rem; }
      .field { display: flex; flex-direction: column; gap: var(--space-1); }
      .field-label { font-size: var(--text-xs); font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
      .field-hint { font-size: var(--text-xs); color: var(--text-muted); }

      .input {
        width: 100%; font: inherit;
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
        padding: var(--space-2) var(--space-3); min-height: 44px;
      }
      .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }

      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
        font: inherit; font-weight: 600; font-size: var(--text-sm);
        padding: var(--space-2) var(--space-4); min-height: 44px;
        border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer;
        transition: background .12s, border-color .12s, opacity .12s;
      }
      .btn:disabled { opacity: .5; cursor: not-allowed; }
      .btn-primary { background: var(--accent); color: var(--accent-ink); }
      .btn-primary:hover:not(:disabled) { background: var(--accent-strong); }
      .btn-ghost { background: transparent; color: var(--text-muted); }
      .btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surface-raised); }

      /* Errors surface exactly like the web UI's toast (styles.css .toast.err),
         minus the auto-hide — a login failure should stay readable. */
      #login-error {
        display: none;
        position: fixed; bottom: var(--space-4); left: var(--space-4); right: var(--space-4);
        max-width: 760px; margin: 0 auto;
        padding: var(--space-3) var(--space-4);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        font-size: var(--text-sm);
        background: var(--danger); color: var(--danger-ink);
        z-index: 10;
      }
      #login-error.show { display: block; }

      /* ---- signed-in view: slim header bar + the web UI, full-bleed ---- */
      #app[hidden] { display: none; }
      #app { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg); }
      .bar {
        flex: none; display: flex; align-items: center; gap: var(--space-3);
        padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .bar .wordmark { font-size: var(--text-base); }
      .bar .who { color: var(--text-muted); font-size: var(--text-sm); }
      .bar .who b { color: var(--text); font-weight: 600; }
      .bar .btn { min-height: 34px; padding: var(--space-1) var(--space-3); font-size: var(--text-xs); border-color: var(--border-strong); }
      .bar-spacer { flex: 1; }
      #dashboard { flex: 1; width: 100%; border: 0; background: var(--bg); }
    </style>
  </head>
  <body>
    <!--
      The lens UI is driven entirely through the SDK bridge (no DOM rendering on
      the glasses); this page is what the wearer sees on their phone, opening
      directly on the login (XERK-82). It is a single page on purpose:
      navigating the WebView away would unload the lens app, so sign-in and the
      embedded web UI live here, beside it.
    -->
    <main class="container" id="login">
      <header class="app-header">
        <h1 class="wordmark"><span class="wordmark-dot" aria-hidden="true"></span>Tenir</h1>
      </header>

      <section>
        <h2>Log in</h2>
        <form id="login-form" autocomplete="on">
          <label class="field">
            <span class="field-label">Server</span>
            <input class="input" id="server-url" name="server" type="text" placeholder="tenir.example.com"
                   autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="url" required />
            <span class="field-hint">Your self-hosted server's address (reachable over HTTPS).</span>
          </label>
          <label class="field">
            <span class="field-label">Username</span>
            <input class="input" id="username" name="username" type="text" placeholder="username"
                   autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required />
          </label>
          <label class="field">
            <span class="field-label">Password</span>
            <input class="input" id="password" name="password" type="password" placeholder="password"
                   autocomplete="current-password" required />
          </label>
          <button class="btn btn-primary" id="login-submit" type="submit">Log in</button>
        </form>
        <p class="muted">Log in to the household on your self-hosted instance. The glasses use the same sign-in and stay signed in.</p>
      </section>
    </main>

    <div id="login-error" role="alert"></div>

    <!-- Signed-in view: the phone companion IS the Tenir web UI, served by the
         user's own server and embedded full-bleed; live captions run on the lens. -->
    <div id="app" hidden>
      <div class="bar">
        <span class="wordmark"><span class="wordmark-dot" aria-hidden="true"></span>Tenir</span>
        <span class="bar-spacer"></span>
        <span class="who">Signed in as <b id="app-user"></b></span>
        <button class="btn btn-ghost" id="sign-out" type="button">Log out</button>
      </div>
      <iframe id="dashboard" title="Tenir web app"></iframe>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
