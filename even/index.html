<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenir</title>
    <style>
      /* Mirrors the web UI's "Lumen" design system (web/src/styles.css): same
         tokens, wordmark, field/button primitives — so the phone side of the
         glasses app reads as the same product. Dark is the signature default;
         light follows the system preference (the WebView has no theme toggle). */
      :root {
        color-scheme: dark;

        --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
        --space-5: 24px; --space-6: 32px;

        --text-xs: .75rem; --text-sm: .875rem; --text-base: 1rem; --text-xl: 1.375rem;
        --font-sans: "Inter", system-ui, -apple-system, sans-serif;
        --font-display: "Space Grotesk", var(--font-sans);

        --radius-sm: 8px; --radius-lg: 14px;
        --shadow-sm: 0 1px 2px rgba(0,0,0,.35);

        --bg: #0E1116;
        --surface: #161B22;
        --surface-raised: #1C232C;
        --border: #232B36;
        --border-strong: #313C4A;
        --text: #E6EDF3;
        --text-muted: #8B97A6;
        --accent: #3FD9C9;
        --accent-strong: #5FE3D5;
        --accent-ink: #0E1116;
        --focus-ring: color-mix(in srgb, var(--accent) 30%, transparent);
        --danger: #FF6B6B;
      }
      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --bg: #F7F9FB; --surface: #FFFFFF; --surface-raised: #F0F3F6;
          --border: #E2E8EF; --border-strong: #CBD5DF;
          --text: #0E1116; --text-muted: #5A6675;
          --accent: #0E8C7E; --accent-strong: #0B7468; --accent-ink: #FFFFFF;
          --focus-ring: color-mix(in srgb, var(--accent) 35%, transparent);
          --danger: #C0392B;
          --shadow-sm: 0 1px 2px rgba(16,22,30,.08);
        }
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: var(--font-sans); font-size: var(--text-base);
        -webkit-font-smoothing: antialiased;
      }

      /* Login: centered card, like the web login inside its section. */
      #login {
        min-height: 100%; display: flex; align-items: center; justify-content: center;
        padding: var(--space-5) var(--space-4);
      }
      #login[hidden] { display: none; }
      .card {
        width: 100%; max-width: 22rem;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: var(--radius-lg); padding: var(--space-5);
        box-shadow: var(--shadow-sm);
      }
      .wordmark {
        font-family: var(--font-display); font-weight: 600; font-size: var(--text-xl);
        letter-spacing: .04em; display: inline-flex; align-items: center; gap: var(--space-2);
        margin: 0 0 var(--space-2);
      }
      .wordmark-dot {
        width: 9px; height: 9px; border-radius: 50%;
        background: var(--accent); box-shadow: 0 0 10px var(--accent);
      }
      h2 {
        font-family: var(--font-display); font-size: var(--text-xl);
        margin: 0 0 var(--space-3);
      }
      .muted { color: var(--text-muted); font-size: var(--text-sm); line-height: 1.55; }

      form { display: flex; flex-direction: column; gap: var(--space-3); }
      .field { display: flex; flex-direction: column; gap: var(--space-1); }
      .field-label {
        font-size: var(--text-xs); font-weight: 600; color: var(--text-muted);
        text-transform: uppercase; letter-spacing: .06em;
      }
      .input {
        width: 100%; font: inherit;
        background: var(--surface); color: var(--text);
        border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
        padding: var(--space-2) var(--space-3); min-height: 44px;
      }
      .input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--focus-ring); }

      .btn {
        display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
        font: inherit; font-weight: 600; font-size: var(--text-sm);
        padding: var(--space-2) var(--space-4); min-height: 44px;
        border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer;
        transition: background .12s, border-color .12s, opacity .12s;
      }
      .btn:disabled { opacity: .5; cursor: not-allowed; }
      .btn-primary { background: var(--accent); color: var(--accent-ink); }
      .btn-primary:hover:not(:disabled) { background: var(--accent-strong); }
      .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border-strong); min-height: 34px; }
      .btn-ghost:hover:not(:disabled) { color: var(--text); background: var(--surface-raised); }

      .field-error {
        display: none; font-size: var(--text-sm); color: var(--danger);
        background: color-mix(in srgb, var(--danger) 12%, transparent);
        border: 1px solid color-mix(in srgb, var(--danger) 40%, transparent);
        border-radius: var(--radius-sm); padding: var(--space-2) var(--space-3);
      }
      .field-error.show { display: block; }

      /* Signed-in: slim header bar + the server's own web UI, full-bleed. */
      #app[hidden] { display: none; }
      #app { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg); }
      .bar {
        flex: none; display: flex; align-items: center; gap: var(--space-3);
        padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .bar .who { color: var(--text-muted); font-size: var(--text-sm); }
      .bar .who b { color: var(--text); font-weight: 600; }
      .bar-spacer { flex: 1; }
      #dashboard { flex: 1; width: 100%; border: 0; background: var(--bg); }
    </style>
  </head>
  <body>
    <!--
      The lens UI is driven entirely through the SDK bridge (no DOM rendering on
      the glasses); this page is what the wearer sees on their phone. It is a
      single page on purpose (XERK-82): navigating the WebView away would unload
      the lens app, so sign-in and the embedded web UI live here, beside it.
    -->
    <div id="login">
      <div class="card">
      <h1 class="wordmark"><span class="wordmark-dot" aria-hidden="true"></span>Tenir</h1>
      <h2>Log in</h2>
      <p class="muted">Enter your Tenir server address, then sign in. The glasses use the same server and stay signed in.</p>

      <div class="field-error" id="login-error"></div>

      <form id="login-form" autocomplete="on">
        <label class="field">
          <span class="field-label">Server</span>
          <input class="input" id="server-url" name="server" type="text" placeholder="tenir.example.com"
                 autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="url" required />
        </label>
        <label class="field">
          <span class="field-label">Username</span>
          <input class="input" id="username" name="username" type="text" placeholder="username"
                 autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" required />
        </label>
        <label class="field">
          <span class="field-label">Password</span>
          <input class="input" id="password" name="password" type="password" placeholder="password"
                 autocomplete="current-password" required />
        </label>
        <button class="btn btn-primary" id="login-submit" type="submit">Log in</button>
      </form>

      <p class="muted">Log in to the household on your self-hosted instance.</p>
      </div>
    </div>

    <!-- Signed-in view: the phone companion IS the Tenir web UI, served by the
         user's own server and embedded full-bleed; live captions run on the lens. -->
    <section id="app" hidden>
      <div class="bar">
        <span class="wordmark" style="font-size: var(--text-base); margin: 0;"><span class="wordmark-dot" aria-hidden="true"></span>Tenir</span>
        <span class="bar-spacer"></span>
        <span class="who">Signed in as <b id="app-user"></b></span>
        <button class="btn btn-ghost" id="sign-out" type="button">Log out</button>
      </div>
      <iframe id="dashboard" title="Tenir web app"></iframe>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
