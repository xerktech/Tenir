<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenir — Companion</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; max-width: 720px; }
      h1 { font-size: 1.3rem; }
      section { border: 1px solid #8884; border-radius: 8px; padding: 0.75rem 1rem; margin: 0.75rem 0; }
      section > h2 { font-size: 1rem; margin: 0 0 0.5rem; }
      input, button { font: inherit; padding: 0.35rem 0.5rem; margin: 0.15rem 0; }
      button { cursor: pointer; }
      .row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
      .muted { opacity: 0.7; font-size: 0.85rem; }
      #toast { position: fixed; bottom: 1rem; left: 1rem; right: 1rem; padding: 0.6rem 1rem;
               border-radius: 6px; display: none; }
      #toast.err { background: #c33; color: #fff; }
      #toast.ok { background: #2a2; color: #fff; }
    </style>
  </head>
  <body>
    <h1>Tenir — Companion</h1>
    <p class="muted">
      Set your server and sign in here — that's what connects the glasses. Session
      history, system status and user management live in the web app, served by
      your server. The live captions run on the glasses.
    </p>
    <div id="app"></div>
    <div id="toast"></div>
    <script type="module" src="/src/companion/companion.ts"></script>
  </body>
</html>
