# Project-wide Gradle settings for the Tenir Android app.

# JVM args for the Gradle daemon.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
org.gradle.parallel=true

# AndroidX (required by React Native).
android.useAndroidX=true
android.enableJetifier=false

# Only relevant when the new architecture is enabled (it compiles per-ABI C++).
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# Use the legacy architecture: the app needs no custom C++/codegen, so this keeps
# the build NDK-free, faster and far more reliable in CI. Flip to true once a
# concrete need for the new architecture (TurboModules/Fabric) appears.
newArchEnabled=false

# Hermes is the JS engine.
hermesEnabled=true
