# tenir — LiteLLM gateway config.
#
# One OpenAI-compatible front door (http://litellm:4000) for the STT model: the
# api sends /v1/audio/transcriptions with the short alias "voxtral" and the
# gateway routes it to the vllm-stt server. The api carries a single base URL +
# key, and LiteLLM adds shared auth (the master key below).
#
# model_name is the short alias apps send as "model" — keep it in sync with the
# api's API_STT_MODEL. litellm_params.model is the provider-prefixed REAL model
# the backend container serves: vllm-stt runs with NO --served-model-name, so it
# exposes its true model id and this gateway owns the aliasing. api_base is the
# compose service DNS name; api_key on the routed entry is a placeholder (vLLM
# doesn't authenticate) — real auth is the master key below.

model_list:
  # Live STT — Voxtral on vllm-stt, OpenAI /audio/transcriptions. mode flags it for
  # the transcription route (LiteLLM otherwise assumes chat). Routed via the mistral/
  # provider, NOT openai/: the openai whisper transform unconditionally rewrites
  # response_format json/text -> verbose_json (to read 'duration' for cost calc), but
  # vLLM-served Voxtral rejects verbose_json with a 400 ("Currently do not support
  # verbose_json for voxtral") — so every live caption failed. The mistral transform
  # passes response_format through and posts to the same {api_base}/audio/transcriptions.
  - model_name: voxtral
    litellm_params:
      model: mistral/mistralai/Voxtral-Mini-3B-2507
      api_base: http://vllm-stt:8000/v1
      api_key: tenir-local
    model_info:
      mode: audio_transcription

  # Cue/summary LLM (XERK-81) — the alias the api sends when API_CUE_BACKEND=openai
  # (API_LLM_MODEL=qwen3-llm). A plain chat model (no mode → /chat/completions), so
  # cues route through this SAME gateway, no new URL/key var. The backend (vllm-cue)
  # is only up under `docker compose --profile cues up`; without it this route just
  # 503s and cues stay silent — captions are unaffected.
  - model_name: qwen3-llm
    litellm_params:
      model: hosted_vllm/Qwen/Qwen3.6-27B-FP8
      api_base: http://vllm-cue:8000/v1
      api_key: tenir-local

litellm_settings:
  # vLLM 400s on OpenAI params it doesn't implement; drop them silently instead.
  drop_params: true

general_settings:
  # Proxy admin key (sk-…, from the LITELLM_MASTER_KEY env). The api
  # authenticates with this key.
  master_key: os.environ/LITELLM_MASTER_KEY
