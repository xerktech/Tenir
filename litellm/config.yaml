# tenir — LiteLLM gateway config.
#
# One OpenAI-compatible front door (http://litellm:4000) for the STT model: the
# api sends /v1/audio/transcriptions with the short alias "parakeet" and the
# gateway routes it to the parakeet STT server. The api carries a single base URL
# + key, and LiteLLM adds shared auth (the master key below).
#
# model_name is the short alias apps send as "model" — keep it in sync with the
# api's API_STT_MODEL. litellm_params.model is the provider-prefixed model id; the
# parakeet server serves one model and ignores the id, so it's cosmetic. api_base
# is the compose service DNS name; api_key on the routed entry is a placeholder
# (the server doesn't authenticate) — real auth is the master key below.

model_list:
  # Live STT — Parakeet on the parakeet server, OpenAI /audio/transcriptions. mode
  # flags it for the transcription route (LiteLLM otherwise assumes chat). Routed
  # via the openai/ provider: the parakeet server implements verbose_json, so the
  # openai transform's json->verbose_json rewrite (to read 'duration' for cost
  # calc) works — the very rewrite vLLM-served Voxtral 400'd on, which is why the
  # old route needed mistral/. verbose_json also carries the word timestamps back.
  - model_name: parakeet
    litellm_params:
      model: openai/parakeet-tdt-0.6b-v3
      api_base: http://parakeet:8000/v1
      api_key: tenir-local
    model_info:
      mode: audio_transcription

litellm_settings:
  # Drop OpenAI params the backend doesn't implement instead of erroring.
  drop_params: true

general_settings:
  # Proxy admin key (sk-…, from the LITELLM_MASTER_KEY env). The api
  # authenticates with this key.
  master_key: os.environ/LITELLM_MASTER_KEY
