# tenir — single-host stack: `docker compose up --build`.
#
# Bare minimum: one app container (api + web UI), Postgres for transcripts,
# the LiteLLM gateway, and the Parakeet STT server (the only GPU container —
# needs the NVIDIA Container Toolkit). Real prod values come from .env (the
# ${VAR:-default} fallbacks are this host's defaults).

name: tenir

services:
  app:
    # ONE container: FastAPI serves the WS/REST api AND the built web SPA on
    # :8080 (same origin, so no CORS and no separate web container). The build
    # context is the repo root — the web build needs the workspace packages.
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        API_EXTRAS: "persistence"
    image: tenir:latest
    ports:
      - "8080:8080"
    environment:
      # Backend selectors are hardcoded — this file starts the matching services, so a
      # .env override would only desync the api. Endpoints/secrets/models come from .env.
      API_LITELLM_ENDPOINT: ${API_LITELLM_ENDPOINT:-http://litellm:4000/v1}
      API_LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-tenir-master}
      # "voxtral" is the generic HTTP /audio/transcriptions engine (not Voxtral-
      # specific); it POSTs each window to the LiteLLM gateway, which routes the
      # model alias below to the Parakeet server.
      API_STT_BACKEND: voxtral
      API_STT_MODEL: ${API_STT_MODEL:-parakeet}
      # Cues (XERK-81): private context cards derived from the conversation. Off by
      # default so the base stack stays STT-only. Set API_CUE_BACKEND=stub for
      # model-free demo cues (no extra container), or =openai to route to a real chat
      # model through the SAME LiteLLM gateway — start it with `--profile cues`, which
      # brings up vllm-cue + registers the qwen3-llm alias in litellm/config.yaml.
      API_CUE_BACKEND: ${API_CUE_BACKEND:-off}
      API_LLM_MODEL: ${API_LLM_MODEL:-qwen3-llm}
      API_HOUSEHOLD_ID: ${API_HOUSEHOLD_ID:-default}
      # You MUST override API_AUTH_SECRET — the api refuses to boot with the default.
      API_AUTH_SECRET: ${API_AUTH_SECRET:-dev-insecure-change-me}
      API_AUTH_ADMIN_USERNAME: ${API_AUTH_ADMIN_USERNAME:-}
      API_AUTH_ADMIN_PASSWORD: ${API_AUTH_ADMIN_PASSWORD:-}
      API_AUTH_ADMIN_HOUSEHOLD: ${API_AUTH_ADMIN_HOUSEHOLD:-default}
      API_PERSISTENCE_BACKEND: postgres
      API_AUDIO_BACKEND: disk
      API_AUDIO_DIR: /data/audio
      API_DATABASE_URL: postgresql://tenir:tenir@postgres-tenir:5432/tenir
      # Status page: on this single-host stack the api shares a network with the
      # model servers, so it probes them directly for a per-model light. Leave unset
      # in a split-host deploy — each light then follows the LiteLLM gateway probe.
      # The cue LLM only runs (and is only probed) under the "cues" profile.
      API_STATUS_STT_URL: ${API_STATUS_STT_URL:-http://parakeet:8000}
      API_STATUS_LLM_URL: ${API_STATUS_LLM_URL:-http://vllm-cue:8000}
    volumes:
      # Retained full audio (the "disk" audio backend). Bind-mounted so it survives
      # container recreation.
      - "C:/docker/tenir/audio:/data/audio"
    depends_on:
      postgres-tenir:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-tenir:
    # Transcripts + users. Plain Postgres — no pgvector needed anymore.
    image: postgres:16
    environment:
      POSTGRES_USER: tenir
      POSTGRES_PASSWORD: tenir
      POSTGRES_DB: tenir
    ports:
      - "5432:5432"
    volumes:
      - "C:/docker/tenir/postgres:/var/lib/postgresql/data"
      # Applied once on first boot of an empty data dir.
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenir"]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    # OpenAI-compatible gateway fronting the parakeet STT server, so the api uses
    # one base URL + key. Routing lives in litellm/config.yaml. CPU-only — it
    # proxies, it doesn't run the model. The non-database image: master-key auth,
    # no Postgres needed.
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      # OVERRIDE in prod.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-tenir-master}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----- GPU model server (needs the NVIDIA Container Toolkit) -----------------

  parakeet:
    # Live STT: NVIDIA Parakeet (parakeet-tdt-0.6b-v3, multilingual + auto language
    # detection) behind an OpenAI /v1/audio/transcriptions surface; the LiteLLM
    # gateway aliases it as "parakeet" for the api. Built from parakeet-stt/Dockerfile
    # (NGC NeMo base) — the same image the release pipeline publishes.
    build:
      context: .
      dockerfile: parakeet-stt/Dockerfile
    image: tenir-parakeet-stt:latest
    ports:
      - "9401:8000"
    volumes:
      # Whole /root/.cache so the HF hub cache AND NeMo's torch cache persist — the
      # ~2.4 GB weights download once.
      - "C:/docker/tenir/parakeet:/root/.cache"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      PARAKEET_MODEL: ${PARAKEET_MODEL:-nvidia/parakeet-tdt-0.6b-v3}
    ipc: host
    healthcheck:
      # 503 until the model is resident (first boot downloads the weights), 200 after.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  vllm-cue:
    # Cue/summary LLM (XERK-81): a chat model the api calls through the SAME LiteLLM
    # gateway to turn the live conversation into private context cues. Opt-in — only
    # started with `--profile cues` (it's a large model and needs its own GPU share
    # alongside Voxtral). The gateway aliases it as "qwen3-llm" (litellm/config.yaml),
    # matching API_LLM_MODEL. Serves under its real model id (no --served-model-name).
    profiles: ["cues"]
    image: ${VLLM_IMAGE:-vllm/vllm-openai:latest}
    command:
      - "--model"
      - "${VLLM_CUE_MODEL:-Qwen/Qwen3.6-27B-FP8}"
      - "--gpu-memory-utilization"
      - "${VLLM_CUE_GPU_MEMORY_UTILIZATION:-0.4}"
      - "--max-model-len"
      - "${VLLM_CUE_MAX_MODEL_LEN:-16384}"
    ports:
      - "9300:8000"
    volumes:
      - "C:/docker/tenir/vllm-cue:/root/.cache/huggingface"
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    ipc: host
    healthcheck:
      # 503 until the model is resident (first boot downloads the weights), 200 after.
      # NOTE: the vllm/vllm-openai image ships only `python3` (no `python` on PATH) —
      # a `python`-based probe exec-fails forever and pins the container at
      # `health: starting`, so this MUST use `python3`.
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 600s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
