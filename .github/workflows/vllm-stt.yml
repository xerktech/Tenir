name: vLLM STT

# PR gate for the Voxtral STT image, a thin patch on top of the multi-GB
# vllm/vllm-openai base — impractical to build/scan on every PR, so the PR gate is
# a cheap Dockerfile lint. Publishing is no longer here: the unified release
# pipeline (release.yml) (re)builds and pushes tenir-vllm-stt to GHCR on a push to
# main that changes the component.
on:
  pull_request:
    branches: [main]
    paths:
      - 'vllm-stt/**'
      - '.github/workflows/vllm-stt.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Dockerfile lint (hadolint)
    # GitHub-hosted: runs hadolint over one Dockerfile. No docker layer cache to keep warm and nothing large
    # on disk, so self-hosting only added queue time behind the image builds.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      # Run hadolint via its container rather than installing a binary. Only hard
      # errors fail the gate — style/pinning warnings on this tiny patch
      # Dockerfile are expected and non-blocking.
      - name: Lint vllm-stt/Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint:latest \
            hadolint --failure-threshold error - < vllm-stt/Dockerfile
