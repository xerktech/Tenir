name: API

# PR gate for the backend: on a PR that touches the api (or the shared contract),
# run its checks (lint + tests + coverage) and build-and-scan its image.
# Publishing is no longer here — the unified release pipeline (release.yml) owns
# building and pushing every image on a push to main. The api image
# (api/Dockerfile, repo-root build context) is a multi-stage build that BAKES IN
# the @tenir/web SPA, so the web-build inputs (web/**, packages/**, root
# package(-lock).json) are image inputs too and trigger this gate.
on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'contract/**'
      - 'web/**'
      - 'packages/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/api.yml'
      - '.github/actions/build-scan-image/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: API (lint + tests + coverage)
    # GitHub-hosted: pip install + lint + pytest. No docker layer cache to keep warm and nothing large
    # on disk, so self-hosting only added queue time behind the image builds.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: api/pyproject.toml

      - name: Install dependencies
        # The uninstall is a leftover from when this job ran on the self-hosted
        # box, whose site-packages persists between jobs: the package was renamed
        # tenir-gateway -> tenir-api, pip doesn't uninstall the old editable
        # install on a name change, and its finder kept pointing at a frozen
        # pre-rename checkout, so `import api` could resolve to stale source.
        # A hosted runner is a fresh VM, so nothing can be stale and this is a
        # no-op — kept because it costs ~0 and is the one thing standing between
        # a future re-pin to self-hosted and a very confusing import bug.
        run: |
          pip uninstall -y tenir-api tenir-gateway 2>/dev/null || true
          pip install -e '.[dev]'

      - name: Lint (ruff)
        run: ruff check .

      # Coverage threshold (--cov-fail-under) is enforced via pyproject.toml addopts.
      - name: Run tests with coverage
        run: pytest --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-coverage
          path: api/coverage.xml
          if-no-files-found: ignore

  image:
    name: Image build + scan (api)
    # Self-hosted: builds a container image and Trivy-scans it -- the warm layer cache
    # and the disk headroom are the point.
    runs-on: [self-hosted, linux]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      # Repo-root build context: the api Dockerfile's node stage compiles the
      # @tenir/web SPA from the npm workspace before the python stage installs
      # api/ and serves the SPA from /srv/web.
      - uses: ./.github/actions/build-scan-image
        with:
          image: tenir:ci-${{ github.sha }}
          context: .
          dockerfile: api/Dockerfile
