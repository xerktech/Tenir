name: release

# The unified release pipeline: ONE v<MAJOR>.<MINOR>.<PATCH> tag per release,
# carrying ALL four components (the api image — which bakes in the web SPA —,
# the Parakeet STT image, the Even .ehpk, and the Android .apk) + a changelog.
# Replaces the per-component main-push publish jobs that used to live in api.yml,
# parakeet-stt.yml, even.yml and mobile.yml (now PR-only CI). See RELEASING.md and
# .github/scripts/README.md.
#
# Model:
#   - PATCH is derived from the existing v* tags (max+1), never committed — so
#     the auto-patch path is read-only against the repo and can't re-trigger
#     itself. Root VERSION holds MAJOR.MINOR only.
#   - Only CHANGED components build; unchanged ones are CARRIED — their image
#     stays referenced at its own older version (never retagged), and their
#     release asset is copied forward under its original name. All the
#     build-vs-carry logic lives in the tested .github/scripts, not in this YAML.
#   - A manual minor/major (workflow_dispatch) bumps VERSION, rolls the
#     intervening patches into CHANGELOG.md, and force-builds every component.
#
# dry_run (the dispatch DEFAULT) exercises everything except the mutations:
# image builds run with push:false, assets upload to Actions artifacts, and no
# tag / release / commit is created. It's the break-glass diagnostic — keep it.
#
# Triggers:
#   - push: main   — the auto patch release. Path-filtered to the component
#     source paths (kept in lockstep with .github/scripts/changes.js by
#     changes.test.js), because a release whose every component is CARRIED
#     publishes nothing new: a docs-only or .github-only merge would still mint a
#     tag and re-attach the previous release's assets verbatim. Changing the
#     release machinery itself is therefore NOT a trigger — rehearse those with a
#     dry_run dispatch, and they take effect on the next real component merge.
#   - workflow_dispatch — manual minor/major, force_all, and the dry_run
#     rehearsal.
on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "contract/**"
      - "packages/**"
      - "web/**"
      - "parakeet-stt/**"
      - "even/**"
      - "mobile/**"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      release_type:
        description: "patch (auto), or a manual minor/major bump"
        type: choice
        options: [patch, minor, major]
        default: patch
      dry_run:
        description: "Rehearse without pushing/tagging/releasing"
        type: boolean
        default: true
      force_all:
        description: "Build every component even if unchanged"
        type: boolean
        default: false

# Global, unqualified group with cancel-in-progress:false — serialize ALL
# releases so two never race on the tag/registry. Rapid merges queue (and older
# pending runs supersede), which is safe because the changelog is range-based:
# the surviving release still covers the superseded merges' PRs.
concurrency:
  group: tenir-release
  cancel-in-progress: false

permissions:
  contents: write # tags, releases, the VERSION/CHANGELOG bump commit
  packages: write # ghcr push
  pull-requests: read # changelog from merged PRs

jobs:
  # ------------------------------------------------------------------ plan ----
  # Read-only: compute version/tag and the per-component build matrix from the
  # tags + the diff since the previous release. See .github/scripts/plan.js.
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      prev_tag: ${{ steps.plan.outputs.prev_tag }}
      changed: ${{ steps.plan.outputs.changed }}
      android_version_code: ${{ steps.plan.outputs.android_version_code }}
      base_major: ${{ steps.plan.outputs.base_major }}
      base_minor: ${{ steps.plan.outputs.base_minor }}
      release_type: ${{ steps.plan.outputs.release_type }}
      build_api: ${{ steps.plan.outputs.build_api }}
      build_parakeet_stt: ${{ steps.plan.outputs.build_parakeet_stt }}
      build_even: ${{ steps.plan.outputs.build_even }}
      build_mobile: ${{ steps.plan.outputs.build_mobile }}
      dry_run: ${{ steps.flags.outputs.dry_run }}
      sha: ${{ github.sha }}
    steps:
      # Full history + tags: nextPatch reads every v* tag, and the changelog
      # walks the range since the previous release. The default shallow checkout
      # fetches no tags, which would make nextPatch return 0 forever.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Resolve flags
        id: flags
        # Interpolated through env: rather than ${{ }} inside run:, which would
        # expand into the shell script itself. Neither value is attacker-
        # controlled here, but the safe shape costs nothing.
        env:
          EVENT_NAME: ${{ github.event_name }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          # On a push trigger there are no inputs -> a real (non-dry) release.
          if [ "$EVENT_NAME" = "push" ]; then
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          fi
      - name: Compute plan
        id: plan
        env:
          RELEASE_TYPE: ${{ inputs.release_type || 'patch' }}
          FORCE_ALL: ${{ inputs.force_all || 'false' }}
        run: node .github/scripts/plan.js
      - name: Summary
        run: |
          {
            echo "## Release ${{ steps.plan.outputs.tag }} (${{ steps.plan.outputs.release_type }}, dry_run=${{ steps.flags.outputs.dry_run }})"
            echo "Previous: ${{ steps.plan.outputs.prev_tag || '(none)' }}"
            echo '```json'
            echo '${{ steps.plan.outputs.changed }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # ------------------------------------------------------------------ bump ----
  # Minor/major only, and only for real: land the new VERSION + a CHANGELOG.md
  # rollup on main BEFORE the builds, so the tag lands on a commit whose VERSION
  # already matches. Patch releases never touch the repo.
  #
  # The default-branch ruleset requires every change to main to arrive via a
  # merged pull request (no direct pushes, no bypass actors), so the bump can't
  # push straight to main — it opens and merges a PR with the workflow token
  # (see the commit step). Needs pull-requests:write for that, on top of the
  # contents:write the merge itself takes.
  bump:
    needs: plan
    if: >-
      !cancelled() && needs.plan.result == 'success'
      && needs.plan.outputs.release_type != 'patch'
      && needs.plan.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # push the bump branch, merge the PR
      pull-requests: write # open the bump PR
    outputs:
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Bump VERSION + roll up CHANGELOG.md
        env:
          NEW_VERSION: ${{ needs.plan.outputs.version }}
          BASE_MAJOR: ${{ needs.plan.outputs.base_major }}
          BASE_MINOR: ${{ needs.plan.outputs.base_minor }}
        run: |
          set -euo pipefail
          # The version file holds MAJOR.MINOR only; the bumped base is version
          # minus its patch.
          printf '%s.%s' "$BASE_MAJOR" "$BASE_MINOR" > VERSION
          DATE="$(date -u +%Y-%m-%d)" NEW_VERSION="$NEW_VERSION" \
            BASE_MAJOR="$BASE_MAJOR" BASE_MINOR="$BASE_MINOR" \
            node .github/scripts/changelog-cli.js
      # The default-branch ruleset forbids a direct `git push origin HEAD:main`,
      # so land the bump the sanctioned way: push a short-lived branch, open a
      # PR, and merge it with the workflow token. The ruleset requires zero
      # approvals and no status checks, so the PR is immediately mergeable; the
      # resulting squash commit on main is the sha the builds and the tag hang
      # off. VERSION/CHANGELOG.md are outside the push trigger's path filter, so
      # merging this commit does not itself re-trigger the release. Both the
      # branch push and the PR create/merge tolerate a leftover branch/PR from a
      # superseded run, so a retried release is self-healing.
      - name: Commit + merge bump PR
        id: commit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="release/bump-${TAG}"
          git switch -c "$BRANCH"
          git add VERSION CHANGELOG.md
          git commit -m "Release ${TAG}"
          # --force: this branch is automation-owned and may linger from a prior
          # failed run; overwrite it rather than fail on a non-fast-forward.
          git push --force origin "$BRANCH"
          # Reuse an existing PR if a prior run already opened one for this head.
          gh pr create --base main --head "$BRANCH" \
            --title "Release ${TAG}" \
            --body "Automated VERSION + CHANGELOG.md rollup for ${TAG}, merged by the release workflow." \
            || echo "A PR for ${BRANCH} already exists — reusing it."
          # Mergeability is computed asynchronously just after create; retry.
          for attempt in 1 2 3 4 5 6; do
            if gh pr merge "$BRANCH" --squash --delete-branch; then
              break
            fi
            if [ "$attempt" = 6 ]; then
              echo "::error::bump PR for ${TAG} never became mergeable" >&2
              exit 1
            fi
            echo "merge not ready (attempt ${attempt}) — retrying in 5s"
            sleep 5
          done
          git fetch origin main
          echo "sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------- build: api ---
  # Self-hosted: the api image is a multi-stage build with the REPO ROOT as its
  # context — a node stage compiles the @tenir/web SPA (npm workspace: root
  # package(-lock).json + packages/** + web/**) and the python stage installs
  # api/ and serves the SPA from /srv/web. One image, one component. On dry_run
  # the composite builds without pushing.
  build-api:
    needs: [plan, bump]
    if: >-
      !cancelled() && needs.plan.result == 'success' && needs.bump.result != 'failure'
      && needs.plan.outputs.build_api == 'true'
    runs-on: [self-hosted, linux]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
      - name: Lowercase owner for GHCR
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Build + push tenir
        uses: ./.github/actions/build-push-image
        with:
          image: ghcr.io/${{ steps.owner.outputs.lc }}/tenir
          tags: |
            latest
            ${{ needs.plan.outputs.version }}
            sha-${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
          context: .
          dockerfile: api/Dockerfile
          build-args: |
            API_EXTRAS=persistence
          token: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ needs.plan.outputs.dry_run != 'true' }}

  # ---------------------------------------------------- build: parakeet-stt ---
  # Self-hosted: builds on the NGC NeMo container, a multi-GB base a hosted runner
  # cannot hold in its ~14 GB of free disk. Context is the repo root because the
  # Dockerfile COPYs parakeet-stt/{requirements.txt,server.py}.
  build-parakeet-stt:
    needs: [plan, bump]
    if: >-
      !cancelled() && needs.plan.result == 'success' && needs.bump.result != 'failure'
      && needs.plan.outputs.build_parakeet_stt == 'true'
    runs-on: [self-hosted, linux]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
      - name: Lowercase owner for GHCR
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      # The Dockerfile's base is nvcr.io/nvidia/nemo, which NGC serves only to
      # authenticated pulls — an anonymous pull 400s with "error from registry:
      # denied" and fails the build. Log in when an NGC key is configured; if it
      # isn't, fall through and rely on any nvcr.io login already on this
      # self-hosted runner (docker login persists in its ~/.docker/config.json).
      - name: Log in to nvcr.io for the NeMo base
        env:
          NGC_API_KEY: ${{ secrets.NGC_API_KEY }}
        run: |
          if [ -n "$NGC_API_KEY" ]; then
            echo "$NGC_API_KEY" | docker login nvcr.io -u '$oauthtoken' --password-stdin
            echo "Logged in to nvcr.io via NGC_API_KEY."
          else
            echo "NGC_API_KEY not set — relying on an existing nvcr.io login on this runner."
          fi
      - name: Build + push tenir-parakeet-stt
        uses: ./.github/actions/build-push-image
        with:
          image: ghcr.io/${{ steps.owner.outputs.lc }}/tenir-parakeet-stt
          tags: |
            latest
            ${{ needs.plan.outputs.version }}
            sha-${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
          context: .
          dockerfile: parakeet-stt/Dockerfile
          token: ${{ secrets.GITHUB_TOKEN }}
          push: ${{ needs.plan.outputs.dry_run != 'true' }}

  # ----------------------------------------------------------- build: even ----
  # GitHub-hosted: an npm build + evenhub pack, no docker cache to keep warm.
  build-even:
    needs: [plan, bump]
    if: >-
      !cancelled() && needs.plan.result == 'success' && needs.bump.result != 'failure'
      && needs.plan.outputs.build_even == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      # Stamp the unified version into app.json before packing — Even Hub keys
      # sideloaded installs on app.json's "version", so it MUST increase per
      # build. `npm run pack` regenerates app.packed.json from app.json (carrying
      # the version into the .ehpk) and defaults the network whitelist to a
      # wildcard so BYO-self-hosting wearers can point the app at their own api
      # host; override via the TENIR_API_HOSTS repo variable to pin.
      - name: Stamp version, build, pack Even app
        working-directory: even
        env:
          VERSION: ${{ needs.plan.outputs.version }}
          TENIR_API_HOSTS: ${{ vars.TENIR_API_HOSTS || '*' }}
        run: |
          set -euo pipefail
          node -e 'const fs=require("fs");const j=JSON.parse(fs.readFileSync("app.json"));j.version=process.env.VERSION;fs.writeFileSync("app.json",JSON.stringify(j,null,2)+"\n")'
          npm run build
          npm run pack
      - name: Name the asset
        run: cp even/tenir.ehpk "$GITHUB_WORKSPACE/tenir-even-v${{ needs.plan.outputs.version }}.ehpk"
      - uses: actions/upload-artifact@v5
        with:
          name: asset-even
          path: tenir-even-v${{ needs.plan.outputs.version }}.ehpk
          if-no-files-found: error

  # -------------------------------------------------------- build: mobile -----
  # GitHub-hosted: ubuntu-latest ships a JDK + the Android SDK, so assembleRelease
  # is a first-class hosted workload. Version name from the unified version;
  # versionCode from the tested version.js packing (NOT run_number). Signing uses
  # the committed, stable release keystore by default (so each build shares one
  # certificate and installs can be updated in place); a private upload key can
  # override it via TENIR_UPLOAD_* secrets wired in as -P props.
  build-mobile:
    needs: [plan, bump]
    if: >-
      !cancelled() && needs.plan.result == 'success' && needs.bump.result != 'failure'
      && needs.plan.outputs.build_mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
      - name: Install required Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - name: Install dependencies
        run: npm ci
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
      - name: Build release APK
        working-directory: mobile/android
        env:
          TENIR_VERSION: ${{ needs.plan.outputs.version }}
          TENIR_VERSION_CODE: ${{ needs.plan.outputs.android_version_code }}
        run: |
          ./gradlew :app:assembleRelease \
            -PTENIR_VERSION_NAME="$TENIR_VERSION" \
            -PTENIR_VERSION_CODE="$TENIR_VERSION_CODE"
      - name: Name the asset
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk "$GITHUB_WORKSPACE/tenir-android-v${{ needs.plan.outputs.version }}.apk"
      - uses: actions/upload-artifact@v5
        with:
          name: asset-mobile
          path: tenir-android-v${{ needs.plan.outputs.version }}.apk
          if-no-files-found: error

  # --------------------------------------------------------------- publish ----
  # Runs last. Assembles manifest.json + release notes, carries unchanged assets
  # forward, and (unless dry_run) creates the tag + release. Runs unless a build
  # that was SUPPOSED to run failed (a skipped/carried component is fine).
  publish:
    needs:
      [plan, bump, build-api, build-parakeet-stt, build-even, build-mobile]
    if: >-
      !cancelled() && needs.plan.result == 'success'
      && needs.bump.result != 'failure'
      && needs.build-api.result != 'failure'
      && needs.build-parakeet-stt.result != 'failure'
      && needs.build-even.result != 'failure'
      && needs.build-mobile.result != 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
      # Collect whatever the build jobs produced into dist/ (flattened).
      - uses: actions/download-artifact@v5
        with:
          pattern: asset-*
          path: dist
          merge-multiple: true
      - name: Compose manifest + notes + carry plan
        env:
          VERSION_FULL: ${{ needs.plan.outputs.version }}
          TAG: ${{ needs.plan.outputs.tag }}
          PREV_TAG: ${{ needs.plan.outputs.prev_tag }}
          CHANGED: ${{ needs.plan.outputs.changed }}
          ANDROID_VERSION_CODE: ${{ needs.plan.outputs.android_version_code }}
          COMMIT: ${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}
          OUT_DIR: meta
        run: |
          set -euo pipefail
          mkdir -p meta dist
          RELEASED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            VERSION_FULL="$VERSION_FULL" TAG="$TAG" PREV_TAG="$PREV_TAG" \
            CHANGED="$CHANGED" ANDROID_VERSION_CODE="$ANDROID_VERSION_CODE" \
            COMMIT="$COMMIT" OUT_DIR="$OUT_DIR" \
            node .github/scripts/publish.js
      # Copy each carried (unchanged) asset forward from the release it lives on,
      # under its original name — executing the plan publish.js computed.
      - name: Fetch carried assets
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, subprocess
          plan = json.load(open("meta/carry-plan.json"))
          for a in plan:
              pats = ["--pattern", a["asset"]]
              if a.get("sha256_asset"):
                  pats += ["--pattern", a["sha256_asset"]]
              subprocess.run(["gh", "release", "download", a["from_release"],
                              *pats, "--dir", "dist", "--clobber"], check=True)
          print(f"carried {len(plan)} asset(s)")
          PY
      - name: Dry run — publish nothing, upload for inspection
        if: needs.plan.outputs.dry_run == 'true'
        run: |
          {
            echo "## DRY RUN ${{ needs.plan.outputs.tag }}"
            echo "No tag, release, or commit created. Composed metadata + assets uploaded as artifacts."
            echo '### Release notes'
            cat meta/release-notes.md
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v5
        if: needs.plan.outputs.dry_run == 'true'
        with:
          name: release-dry-run-${{ needs.plan.outputs.version }}
          path: |
            meta/
            dist/
      - name: Create tag + release
        if: needs.plan.outputs.dry_run != 'true'
        run: |
          set -euo pipefail
          cp meta/manifest.json dist/manifest.json
          gh release create "${{ needs.plan.outputs.tag }}" \
            --target "${{ needs.bump.outputs.sha || needs.plan.outputs.sha }}" \
            --title "Tenir ${{ needs.plan.outputs.tag }}" \
            --notes-file meta/release-notes.md \
            dist/*
