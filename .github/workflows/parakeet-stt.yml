name: Parakeet STT

# PR gate for the Parakeet STT image, a patch on top of the multi-GB NGC NeMo
# base — impractical to build/scan on every PR, so the PR gate is a cheap
# Dockerfile lint. Publishing is the unified release pipeline (release.yml), which
# (re)builds and pushes tenir-parakeet-stt to GHCR on a push to main that changes
# the component.
on:
  pull_request:
    branches: [main]
    paths:
      - 'parakeet-stt/**'
      - '.github/workflows/parakeet-stt.yml'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      # Only hard errors fail the gate; style/pin warnings on this thin patch
      # Dockerfile are expected and non-blocking.
      - name: Lint parakeet-stt/Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint:latest \
            hadolint --failure-threshold error - < parakeet-stt/Dockerfile
